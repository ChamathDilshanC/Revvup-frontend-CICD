name: Android Release APK

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: android-build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-apk:
    name: Build Android Release APK
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      NODE_VERSION: "20"
      JAVA_VERSION: "17"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Cache node_modules
        uses: actions/cache@v4
        id: node-modules-cache
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            node-modules-${{ runner.os }}-

      - name: Install Java (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            android/.gradle
          key: gradle-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Install npm dependencies
        if: steps.node-modules-cache.outputs.cache-hit != 'true'
        run: npm ci

      - name: Create .env for Expo public variables
        env:
          API_URL: ${{ secrets.EXPO_PUBLIC_API_URL }}
        run: |
          if [ -z "$API_URL" ]; then
            API_URL="https://revvup-backend.vercel.app"
          fi
          cat > .env <<EOF
          EXPO_PUBLIC_API_URL=${API_URL}
          EOF

      - name: Generate native Android project (Expo prebuild)
        run: npx expo prebuild --platform android --no-install

      - name: Prepare release signing
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/app/release.keystore
            echo "Release keystore decoded from GitHub Secrets."
          else
            echo "No ANDROID_KEYSTORE_BASE64 secret configured; Gradle will use the default debug signing config."
          fi

      - name: Build release APK
        working-directory: android
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          GRADLE_ARGS="--no-daemon --stacktrace"

          if [ -f app/release.keystore ] && [ -n "$ANDROID_KEYSTORE_PASSWORD" ] && [ -n "$ANDROID_KEY_ALIAS" ] && [ -n "$ANDROID_KEY_PASSWORD" ]; then
            echo "Signing release APK with configured keystore secrets."
            ./gradlew assembleRelease $GRADLE_ARGS \
              -Pandroid.injected.signing.store.file="${{ github.workspace }}/android/app/release.keystore" \
              -Pandroid.injected.signing.store.password="$ANDROID_KEYSTORE_PASSWORD" \
              -Pandroid.injected.signing.key.alias="$ANDROID_KEY_ALIAS" \
              -Pandroid.injected.signing.key.password="$ANDROID_KEY_PASSWORD"
          else
            echo "Building release APK without production signing (suitable for CI artifacts and internal testing)."
            ./gradlew assembleRelease $GRADLE_ARGS
          fi

      - name: Prepare release metadata
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        id: release
        run: |
          VERSION=$(node -p "require('./package.json').version")
          SHORT_SHA=$(git rev-parse --short HEAD)
          TIMESTAMP=$(date -u +%Y%m%dT%H%M%SZ)
          TAG="android-v${VERSION}-${TIMESTAMP}-${SHORT_SHA}"

          mkdir -p release
          cp android/app/build/outputs/apk/release/*.apk "release/revvup-android-v${VERSION}-${SHORT_SHA}.apk"

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "short_sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "apk_path=release/revvup-android-v${VERSION}-${SHORT_SHA}.apk" >> "$GITHUB_OUTPUT"

      - name: Publish APK to GitHub Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release.outputs.tag }}
          name: RevvUp Android v${{ steps.release.outputs.version }} (${{ steps.release.outputs.short_sha }})
          body: |
            Automated Android release build from commit `${{ github.sha }}`.

            | Field | Value |
            | --- | --- |
            | Version | `${{ steps.release.outputs.version }}` |
            | Commit | `${{ steps.release.outputs.short_sha }}` |
            | Workflow run | [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) |
          prerelease: true
          files: ${{ steps.release.outputs.apk_path }}

      - name: Upload APK artifact (pull requests)
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: revvup-android-pr-${{ github.event.pull_request.number }}
          path: android/app/build/outputs/apk/release/*.apk
          if-no-files-found: error
          retention-days: 7
